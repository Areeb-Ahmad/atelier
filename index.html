<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondrian Studio | Nitro-Load</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            --m-red: #E61919; --m-blue: #0055AA; --m-yellow: #FFD200;
            --m-black: #111111; --m-white: #FFFFFF;
        }

        body { 
            background: #000; color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; overflow-x: hidden;
        }

        .navbar { background: #000; border-bottom: 1px solid #222; padding: 1.2rem 0; }

        #collage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 160px;
            grid-auto-flow: dense;
            gap: 12px;
            background: var(--m-black);
            padding: 12px;
            border: 12px solid var(--m-black);
            min-height: 80vh;
            margin-bottom: 50px;
        }

        .grid-item-wrapper {
            position: relative;
            background: var(--m-white);
            padding: 8px; /* The Mondrian White Frame */
            overflow: hidden;
            display: flex;
            align-items: center; justify-content: center;
            transition: transform 0.2s;
            cursor: pointer;
        }

        /* Loading pulse effect for better perceived speed */
        .is-loading {
            background: #eee;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .grid-item { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }
        
        .grid-text { 
            color: #000; font-weight: 800; text-transform: uppercase; 
            line-height: 1.1; word-wrap: break-word; margin: 0; width: 100%; 
            padding: 10px;
        }

        .block-red { background: var(--m-red); }
        .block-red .grid-text { color: white; }
        .block-blue { background: var(--m-blue); }
        .block-blue .grid-text { color: white; }
        .block-yellow { background: var(--m-yellow); }
        
        .span-wide { grid-column: span 2; }
        .span-tall { grid-row: span 2; }
        .span-large { grid-column: span 2; grid-row: span 2; }

        .btn-ui {
            background: transparent; border: 1px solid #444; color: #fff;
            font-size: 10px; letter-spacing: 2px; padding: 8px 16px;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-ui:hover { background: white; color: black; border-color: white; }

        .btn-remove {
            position: absolute; top: 2px; right: 2px; padding: 4px 8px;
            background: rgba(0,0,0,0.8); color: white; border: none; font-size: 9px;
            display: none; cursor: pointer; z-index: 20;
        }
        .grid-item-wrapper:hover .btn-remove { display: block; }

        .m-modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center;
        }
        .m-modal-content {
            background: var(--m-white); color: #000; padding: 40px;
            width: 90%; max-width: 500px; border: 10px solid var(--m-black);
        }

        .control-panel { max-width: 800px; margin: 30px auto; }
        .form-control { background: #111; border: 1px solid #333; color: white; border-radius: 0; }
        .form-control:focus { background: #181818; border-color: var(--m-blue); box-shadow: none; color: white; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span style="font-weight: 900; letter-spacing: 4px;">STUDIO</span>
        <div class="d-flex gap-2">
            <button class="btn-ui" onclick="shuffleGrid()" style="border-color: var(--m-yellow);">Shuffle</button>
            <button class="btn-ui" onclick="toggleModal(true)">Batch Upload</button>
            <button class="btn-ui" style="border-color: var(--m-red);" onclick="clearGrid()">Reset</button>
            <button class="btn-ui" style="background: white; color: black;" onclick="exportImage()">Export PNG</button>
        </div>
    </div>
</nav>

<div class="container control-panel">
    <div class="input-group shadow-lg">
        <input type="text" class="form-control" id="smart-input" placeholder="Paste link OR type text...">
        <button class="btn btn-light px-4 fw-bold" onclick="handleSingleInput()">ADD</button>
    </div>
</div>

<div id="collage-grid"></div>

<div id="upload-modal" class="m-modal">
    <div class="m-modal-content">
        <h2 style="font-weight: 900; text-transform: uppercase;">Nitro Batch Import</h2>
        <hr style="border-top: 5px solid black; opacity: 1;">
        <p style="font-size: 13px;">Images are pre-fetched into memory for instant rendering.</p>
        <input type="file" id="file-input" accept=".txt" class="form-control mb-3" style="background: #eee; color: #000; border: 2px solid #000;">
        <div class="d-flex gap-2">
            <button class="btn btn-dark flex-grow-1 rounded-0 fw-bold" id="process-btn" onclick="processFile()">START NITRO LOAD</button>
            <button class="btn btn-outline-dark rounded-0" onclick="toggleModal(false)">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const grid = document.getElementById('collage-grid');
    const spanCycle = ['', 'span-wide', 'span-tall', 'span-large'];
    const colors = ['block-red', 'block-blue', 'block-yellow'];

    function toggleModal(show) {
        document.getElementById('upload-modal').style.display = show ? 'flex' : 'none';
    }

    // Nitro Fetch: Grabs raw data to bypass browser image "waiting"
    async function nitroFetch(url) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout
            const response = await fetch(url, { mode: 'cors', signal: controller.signal });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error();
            const blob = await response.blob();
            return URL.createObjectURL(blob);
        } catch (e) {
            return url; // Fallback to normal URL if CORS is blocked
        }
    }

    function shuffleGrid() {
        const tiles = Array.from(grid.children);
        for (let i = tiles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            grid.appendChild(tiles[j]);
        }
        save();
    }

    async function handleSingleInput() {
        const val = document.getElementById('smart-input').value.trim();
        if (!val) return;
        const isUrl = val.startsWith('http');
        const tile = createTileElement(isUrl ? 'loading' : null, '', null, isUrl ? null : val);
        grid.appendChild(tile);
        
        if (isUrl) {
            const nitroUrl = await nitroFetch(val);
            const img = tile.querySelector('img');
            if (img) img.src = nitroUrl;
        }

        document.getElementById('smart-input').value = '';
        save();
    }

    function processFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
            toggleModal(false);

            const fragment = document.createDocumentFragment();
            const taskQueue = [];

            // 1. Instant UI: Create all boxes as placeholders immediately
            lines.forEach(line => {
                const isUrl = line.startsWith('http');
                const tile = createTileElement(
                    isUrl ? 'loading' : null, 
                    '', 
                    isUrl ? null : colors[Math.floor(Math.random() * colors.length)], 
                    isUrl ? null : line
                );
                fragment.appendChild(tile);
                if (isUrl) taskQueue.push({ url: line, tile });
            });

            grid.appendChild(fragment);

            // 2. Parallel Background Fetching
            taskQueue.forEach(async (task) => {
                const nitroUrl = await nitroFetch(task.url);
                const img = task.tile.querySelector('img');
                if (img) {
                    img.src = nitroUrl;
                    task.tile.classList.remove('is-loading');
                }
            });

            save();
            fileInput.value = '';
        };
        reader.readAsText(file);
    }

    function createTileElement(url, span, color, text) {
        const wrapper = document.createElement('div');
        wrapper.className = `grid-item-wrapper ${span} ${color || ''}`;
        
        if (url) {
            if (url === 'loading') wrapper.classList.add('is-loading');
            const img = document.createElement('img');
            img.className = 'grid-item';
            if (url !== 'loading') img.src = url;

            img.onload = () => {
                img.style.opacity = "1";
                if (img.width / img.height > 1.2) wrapper.classList.add('span-wide');
                if (img.width / img.height < 0.8) wrapper.classList.add('span-tall');
            };
            wrapper.appendChild(img);
        } else if (text) {
            const p = document.createElement('p');
            p.className = 'grid-text';
            p.innerText = text;
            wrapper.appendChild(p);
        }

        wrapper.onclick = (e) => {
            if (e.target.tagName === 'BUTTON') return;
            let current = spanCycle.find(s => s && wrapper.classList.contains(s)) || '';
            let next = (spanCycle.indexOf(current) + 1) % spanCycle.length;
            spanCycle.forEach(s => { if(s) wrapper.classList.remove(s) });
            if (spanCycle[next]) wrapper.classList.add(spanCycle[next]);
            save();
        };

        const rm = document.createElement('button');
        rm.innerText = "✕"; rm.className = "btn-remove";
        rm.onclick = (e) => { e.stopPropagation(); wrapper.remove(); save(); };
        wrapper.appendChild(rm);
        
        return wrapper;
    }

    function save() {
        const data = Array.from(grid.querySelectorAll('.grid-item-wrapper')).map(w => ({
            url: w.querySelector('img')?.src || null,
            text: w.querySelector('.grid-text')?.innerText || null,
            span: Array.from(w.classList).find(c => c.startsWith('span-')) || '',
            color: Array.from(w.classList).find(c => c.startsWith('block-')) || ''
        }));
        localStorage.setItem('mondrian_nitro_v1', JSON.stringify(data));
    }

    function clearGrid() {
        if(confirm("Wipe everything?")) { grid.innerHTML = ''; localStorage.removeItem('mondrian_nitro_v1'); }
    }

    function exportImage() {
        const btns = document.querySelectorAll('.btn-remove');
        btns.forEach(b => b.style.display = 'none');
        html2canvas(grid, { useCORS: true, scale: 2, backgroundColor: '#111' }).then(canvas => {
            const link = document.createElement('a');
            link.download = `composition-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            btns.forEach(b => b.style.removeProperty('display'));
        });
    }

    // Init logic
    const saved = JSON.parse(localStorage.getItem('mondrian_nitro_v1') || '[]');
    saved.forEach(s => grid.appendChild(createTileElement(s.url, s.span, s.color, s.text)));
    new Sortable(grid, { animation: 250, onEnd: save, filter: '.btn-remove' });
</script>

</body>
</html>
